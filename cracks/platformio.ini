; Yaeger crack-listener
;
; Standalone ESP32 firmware that listens for first/second crack pops via
; an I2S MEMS mic, runs an FFT, and reports detections to the main
; Yaeger roaster controller over UART (TX=GPIO17, RX=GPIO16).
;
; Built independently from the main roaster firmware in ../platformio.ini.

[platformio]
default_envs = esp32-cracks

[env:esp32-cracks]
platform  = espressif32@6.9.0
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed  = 921600
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
  kosme/arduinoFFT@^2.0.4
  adafruit/Adafruit NeoPixel@^1.12.3
